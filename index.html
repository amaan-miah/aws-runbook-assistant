<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AWS Runbook Assistant</title>
<style>
  body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
  h1 { font-size: 24px; }
  #question { width: 100%; padding: 10px; font-size: 16px; margin-bottom: 10px; box-sizing: border-box; }
  #ask { padding: 10px 20px; font-size: 16px; cursor: pointer; }
  #answer { margin-top: 20px; padding: 20px; background: #f5f5f5; border-radius: 8px; white-space: pre-wrap; min-height: 100px; }
  #loading { display: none; color: #666; margin-top: 10px; }
</style>
</head>
<body>
<h1>AWS Runbook Assistant</h1>
<p>Ask a question about AWS troubleshooting</p>
<textarea id="question" rows="3" placeholder="e.g. How do I troubleshoot a Lambda timeout?"></textarea>
<button id="ask" onclick="askQuestion()">Ask</button>
<div id="loading">Thinking...</div>
<div id="answer"></div>

<script>
async function askQuestion() {
  const query = document.getElementById('question').value;
  if (!query) return;
  document.getElementById('loading').style.display = 'block';
  document.getElementById('answer').innerText = '';
  
  const response = await fetch('https://vnfo4o4oz6.execute-api.eu-west-2.amazonaws.com', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ query: query })
  });
  
  const data = await response.json();
  document.getElementById('loading').style.display = 'none';
  document.getElementById('answer').innerText = data.answer;
}
</script>
</body>
</html>
